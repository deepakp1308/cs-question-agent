name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest pytest-cov ruff

      - name: Generate sample paper
        run: python scripts/make_sample_paper.py

      - name: Lint
        run: ruff check app tests

      - name: Run tests
        run: pytest -q --cov=app --cov-report=term-missing

      - name: Run demo pipeline (mock adapter)
        run: python -m app.cli run --input example_input --run-id ci-smoke

      - name: Upload run artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: run-artifacts-py${{ matrix.python-version }}
          path: |
            site/
            runs/ci-smoke/REPORT.md
            runs/ci-smoke/metrics.json
          if-no-files-found: ignore
